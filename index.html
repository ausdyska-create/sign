<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>전자서명 제출</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { touch-action: none; -webkit-user-select: none; user-select: none; overscroll-behavior: none; }
        canvas { touch-action: none; cursor: crosshair; background-color: white; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center p-4">
    <div class="w-full max-w-md bg-white rounded-[2.5rem] shadow-xl overflow-hidden border border-slate-200 mt-6">
        <div id="connection-status" class="bg-slate-100 px-4 py-2 text-[10px] font-bold text-slate-400 flex items-center justify-center gap-2">
            <span id="status-dot" class="w-2 h-2 rounded-full bg-slate-300"></span>
            <span id="status-text">서버 연결 확인 중...</span>
        </div>
        <div class="p-8 pb-4 text-center">
            <h1 class="text-2xl font-black text-slate-800 tracking-tight">전자서명 제출</h1>
            <p class="text-slate-500 mt-2 font-medium">성함을 입력하고 아래 칸에 서명해 주세요</p>
        </div>
        <div class="px-8 pb-8 space-y-6">
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-2 uppercase ml-1">작성자 성명</label>
                <input type="text" id="user-name" placeholder="예: 홍길동" class="w-full px-5 py-4 bg-slate-50 border-2 border-transparent focus:border-indigo-500 rounded-2xl outline-none transition-all font-semibold text-slate-700 shadow-inner">
            </div>
            <div id="canvas-container" class="relative w-full aspect-[4/3] bg-white rounded-2xl border-2 border-slate-100 overflow-hidden shadow-inner">
                <canvas id="signature-pad" class="w-full h-full"></canvas>
                <div class="absolute bottom-10 left-6 right-6 border-b border-slate-200 pointer-events-none"></div>
            </div>
            <div class="flex justify-between items-center px-1">
                <div class="flex gap-3">
                    <button onclick="setPenColor('#000000')" id="color-black" class="w-8 h-8 rounded-full bg-black ring-2 ring-offset-2 ring-black"></button>
                    <button onclick="setPenColor('#2563eb')" id="color-blue" class="w-8 h-8 rounded-full bg-blue-600"></button>
                </div>
                <button id="clear-btn" class="text-sm font-bold text-slate-400 hover:text-slate-600 transition-colors">전체 지우기</button>
            </div>
            <button id="submit-btn" disabled class="w-full py-5 bg-indigo-600 text-white font-black rounded-2xl shadow-xl shadow-indigo-100 hover:bg-indigo-700 active:scale-95 disabled:bg-slate-300 transition-all flex justify-center items-center gap-3">
                <span id="btn-text">서명 제출하기</span>
                <div id="loader" class="hidden w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
            </button>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'sign-collector';
        const canvas = document.getElementById('signature-pad');
        const container = document.getElementById('canvas-container');
        const ctx = canvas.getContext('2d');
        const userNameInput = document.getElementById('user-name');
        const submitBtn = document.getElementById('submit-btn');
        const loader = document.getElementById('loader');
        const btnText = document.getElementById('btn-text');
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');
        let isDrawing = false, lastX = 0, lastY = 0, currentColor = '#000000';
        onAuthStateChanged(auth, (user) => {
            if (user) {
                statusText.textContent = "서버 연결됨 (제출 가능)";
                statusDot.className = "w-2 h-2 rounded-full bg-emerald-500";
                submitBtn.disabled = false;
            } else { signInAnonymously(auth); }
        });
        function resize() {
            const r = window.devicePixelRatio || 1;
            canvas.width = container.offsetWidth * r;
            canvas.height = container.offsetHeight * r;
            ctx.scale(r, r);
            ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.lineWidth = 3; ctx.strokeStyle = currentColor;
        }
        window.addEventListener('load', resize); window.addEventListener('resize', resize);
        window.setPenColor = (c) => { currentColor = c; ctx.strokeStyle = c; };
        const getPos = (e) => {
            const rect = canvas.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: cx - rect.left, y: cy - rect.top };
        };
        canvas.addEventListener('touchstart', (e) => { isDrawing = true; const p = getPos(e); [lastX, lastY] = [p.x, p.y]; }, {passive: false});
        canvas.addEventListener('touchmove', (e) => { if (!isDrawing) return; if (e.cancelable) e.preventDefault(); const p = getPos(e); ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(p.x, p.y); ctx.stroke(); [lastX, lastY] = [p.x, p.y]; }, {passive: false});
        window.addEventListener('touchend', () => isDrawing = false);
        canvas.addEventListener('mousedown', (e) => { isDrawing = true; const p = getPos(e); [lastX, lastY] = [p.x, p.y]; });
        canvas.addEventListener('mousemove', (e) => { if (!isDrawing) return; const p = getPos(e); ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(p.x, p.y); ctx.stroke(); [lastX, lastY] = [p.x, p.y]; });
        window.addEventListener('mouseup', () => isDrawing = false);
        document.getElementById('clear-btn').onclick = () => ctx.clearRect(0,0,canvas.width,canvas.height);
        submitBtn.onclick = async () => {
            const name = userNameInput.value.trim();
            if(!name) return alert("성함을 입력해주세요.");
            const blank = document.createElement('canvas'); blank.width = canvas.width; blank.height = canvas.height;
            if (canvas.toDataURL() === blank.toDataURL()) return alert("서명을 그려주세요.");
            setLoading(true);
            try {
                const dataURL = canvas.toDataURL('image/png');
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'signatures'), {
                    name, image: dataURL, timestamp: serverTimestamp(), uid: auth.currentUser.uid
                });
                const link = document.createElement('a'); link.download = `서명_${name}.png`; link.href = dataURL; link.click();
                alert("제출 완료!"); ctx.clearRect(0,0,canvas.width,canvas.height); userNameInput.value = "";
            } catch (e) { alert("제출 실패"); } finally { setLoading(false); }
        };
        function setLoading(isLoading) {
            submitBtn.disabled = isLoading; loader.classList.toggle('hidden', !isLoading);
            btnText.textContent = isLoading ? "제출 중..." : "서명 제출하기";
        }
    </script>
</body>
</html>
