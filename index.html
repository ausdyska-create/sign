<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>전자서명 제출</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- [초강력 해결책] 글로벌 표준 전자서명 라이브러리 (터치 씹힘 100% 해결) -->
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>

    <style>
        /* 모바일 브라우저 튕김, 당겨서 새로고침 완벽 차단 */
        html, body { 
            position: fixed; 
            overflow: hidden; 
            width: 100%; 
            height: 100%; 
            margin: 0; padding: 0;
            touch-action: none; 
            -webkit-user-select: none; user-select: none;
            overscroll-behavior: none;
            background-color: #f8fafc;
        }

        /* 캔버스 자체의 터치 동작을 막아 라이브러리가 독점하도록 설정 */
        canvas {
            touch-action: none !important;
            cursor: crosshair;
        }

        input::placeholder { color: #cbd5e1; }

        /* 커스텀 알림창 (카카오톡 alert 무시 현상 방지) */
        #custom-toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #1e293b;
            color: white;
            padding: 16px 24px;
            border-radius: 99px;
            font-weight: bold;
            font-size: 14px;
            z-index: 9999;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease, top 0.3s ease;
        }
        #custom-toast.show { top: 40px; opacity: 1; }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4">

    <!-- 커스텀 알림창 -->
    <div id="custom-toast">메시지</div>

    <div class="w-full max-w-md bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-200">
        <!-- 상태 표시 바 -->
        <div id="connection-status" class="bg-slate-100 px-4 py-2 text-[10px] font-bold text-slate-400 flex items-center justify-center gap-2">
            <span id="status-dot" class="w-2 h-2 rounded-full bg-slate-300"></span>
            <span id="status-text">서버 연결 확인 중...</span>
        </div>

        <div class="p-8 pb-4 text-center">
            <h1 class="text-2xl font-black text-slate-800 tracking-tight leading-tight">전자서명</h1>
            <p class="text-slate-500 mt-2 font-medium">성함을 입력하고 아래 칸에 서명해 주세요</p>
        </div>

        <div class="px-8 pb-8 space-y-5">
            <!-- 성명 입력란 -->
            <div>
                <label class="block text-[11px] font-black text-slate-400 mb-2 uppercase ml-1 tracking-wider">작성자 성명</label>
                <input type="text" id="user-name" placeholder="예: 홍길동" 
                    class="w-full px-5 py-4 bg-slate-50 border-2 border-transparent focus:border-indigo-500 focus:bg-white rounded-2xl outline-none transition-all font-bold text-slate-700 shadow-inner">
            </div>

            <!-- 서명 영역 (라이브러리 전용) -->
            <div id="canvas-container" class="relative w-full aspect-[4/3] bg-white rounded-3xl border-2 border-slate-100 overflow-hidden shadow-inner">
                <canvas id="signature-pad" class="w-full h-full absolute inset-0"></canvas>
                
                <!-- 안내 문구 -->
                <div id="guide-text" class="absolute inset-0 flex items-center justify-center pointer-events-none transition-opacity duration-300">
                    <span class="text-slate-300 text-lg font-black tracking-widest">여기에 서명해 주세요</span>
                </div>
                
                <div class="absolute bottom-10 left-8 right-8 border-b-2 border-dashed border-slate-200 pointer-events-none"></div>
            </div>

            <!-- 하단 버튼 레이아웃 -->
            <div class="grid grid-cols-2 gap-3">
                <button id="clear-btn" class="py-4 bg-slate-100 text-slate-500 font-bold rounded-2xl active:scale-95 transition-all text-sm">
                    전체 지우기
                </button>
                <button id="submit-btn" disabled class="py-4 bg-indigo-600 text-white font-black rounded-2xl shadow-lg shadow-indigo-100 hover:bg-indigo-700 active:scale-95 disabled:bg-slate-200 disabled:shadow-none transition-all flex justify-center items-center gap-2 text-sm">
                    <span id="btn-text">제출하기</span>
                    <div id="loader" class="hidden w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase 설정
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'sign-collector';

        // UI 요소
        const canvas = document.getElementById('signature-pad');
        const guideText = document.getElementById('guide-text');
        const userNameInput = document.getElementById('user-name');
        const submitBtn = document.getElementById('submit-btn');
        const loader = document.getElementById('loader');
        const btnText = document.getElementById('btn-text');
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');

        // 자체 알림창
        function showToast(message) {
            const toast = document.getElementById('custom-toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // 서버 연결
        onAuthStateChanged(auth, (user) => {
            if (user) {
                statusText.textContent = "서버 연결됨";
                statusDot.className = "w-2 h-2 rounded-full bg-emerald-500";
                submitBtn.disabled = false;
            } else {
                signInAnonymously(auth).catch(() => {
                    statusText.textContent = "연결 오류";
                    statusDot.className = "w-2 h-2 rounded-full bg-rose-500";
                });
            }
        });

        // ----------------------------------------------------
        // [핵심 해결 영역] 전문 서명 라이브러리 (SignaturePad) 초기화
        // ----------------------------------------------------
        const signaturePad = new window.SignaturePad(canvas, {
            minWidth: 1.5,
            maxWidth: 4.5,
            penColor: "rgb(0, 0, 0)",
            backgroundColor: "rgb(255, 255, 255)"
        });

        // 선을 긋기 시작하면 안내 문구 숨기기
        signaturePad.addEventListener("beginStroke", () => {
            guideText.style.display = 'none';
        });

        // 화면 크기에 맞춰 캔버스 화질 및 좌표 영점 조절 (오차 방지)
        function resizeCanvas() {
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            // 캔버스의 실제 크기를 해상도에 맞춰 뻥튀기 후 스케일 조정
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
            
            // 리사이즈 후에는 항상 캔버스를 비워주어야 오동작하지 않음
            signaturePad.clear();
            guideText.style.display = 'flex';
        }

        window.addEventListener("resize", resizeCanvas);
        // 페이지 렌더링이 끝난 직후 크기 조절 실행
        setTimeout(resizeCanvas, 100);
        // ----------------------------------------------------

        // 지우기 버튼
        document.getElementById('clear-btn').onclick = () => {
            signaturePad.clear();
            guideText.style.display = 'flex';
        };

        // 제출 버튼 로직
        submitBtn.onclick = async () => {
            const name = userNameInput.value.trim();
            if (!name) return showToast("작성자 성함을 입력해 주세요.");
            
            // 라이브러리의 isEmpty() 기능으로 서명 여부 완벽 감지
            if (signaturePad.isEmpty()) return showToast("서명을 진행해 주세요.");
            
            if (!auth.currentUser) return showToast("서버와 연결 중입니다.");

            setLoading(true);
            try {
                // 서명 이미지를 배경색상 포함하여 추출
                const dataURL = signaturePad.toDataURL('image/png');
                
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'signatures'), {
                    name: name, 
                    image: dataURL, 
                    timestamp: serverTimestamp(), 
                    uid: auth.currentUser.uid
                });
                
                // 파일 자동 다운로드 (선택사항)
                const link = document.createElement('a');
                link.download = `서명_${name}.png`;
                link.href = dataURL;
                link.click();
                
                showToast("성공적으로 제출되었습니다!");
                signaturePad.clear();
                guideText.style.display = 'flex';
                userNameInput.value = "";
            } catch (e) {
                showToast("제출 중 네트워크 오류가 발생했습니다.");
            } finally {
                setLoading(false);
            }
        };

        function setLoading(isLoading) {
            submitBtn.disabled = isLoading;
            loader.classList.toggle('hidden', !isLoading);
            btnText.textContent = isLoading ? "제출 중..." : "제출하기";
        }
    </script>
</body>
</html>
